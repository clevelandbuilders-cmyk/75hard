<style>

/* PAGE HEAD */
.page-head{padding:28px 20px 20px;border-bottom:1px solid #2e2e2e;margin-bottom:24px}
.page-label{font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:3px;color:#e63946;text-transform:uppercase;margin-bottom:6px}
.page-title{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(36px,9vw,64px);line-height:.92;color:#fff;margin-bottom:10px}
.page-sub{font-size:13px;color:#888;line-height:1.6;max-width:480px}

.filter-bar{padding:0 20px;margin-bottom:20px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}

.filter-btn.active{background:#e63946;border-color:#e63946;color:#fff}

/* RECIPE GRID */
.recipe-list{padding:0 20px;display:flex;flex-direction:column;gap:16px}

/* RECIPE CARD */
.recipe-card{background:#1a1a1a;border:1px solid #2e2e2e;overflow:hidden;cursor:pointer;transition:border-color .2s}
.recipe-card:hover{border-color:#444}
.recipe-card.open{border-color:#e63946}
.card-header{padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-meta{flex:1}

.recipe-card.open .card-body{display:block}

.servings-lbl{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#555}

.srv-btn{width:28px;height:28px;background:#1a1a1a;border:1px solid #2e2e2e;color:#bbb;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1}
.srv-btn:hover{border-color:#e63946;color:#e63946}
.srv-count{font-family:‘DM Mono’,monospace;font-size:16px;color:#fff;min-width:24px;text-align:center}

.recipe-cols{display:grid;grid-template-columns:1fr 1fr;gap:0}

.step-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #2e2e2e}
.step-item:last-child{border-bottom:none}
.step-num{width:22px;height:22px;background:#e63946;color:#fff;font-family:‘DM Mono’,monospace;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-content{flex:1}
.step-title{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#f4c430;margin-bottom:4px}
.step-text{font-size:12px;color:#888;line-height:1.6}

.notes-lbl{font-family:‘DM Mono’,monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#f4c430;margin-bottom:5px}

/* EMPTY */
.empty{padding:40px 20px;text-align:center;color:#555;font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:1.5px}

</head>

// Active timers
const timers = {};

function fmtAmt(base, servings, baseServings) {
  const scaled = (base * servings) / baseServings;
  if (scaled === Math.floor(scaled)) return scaled.toString();
  const rounded = Math.round(scaled * 8) / 8;
  if (rounded === Math.floor(rounded)) return rounded.toString();
  // Show as fraction if clean
  const eighths = Math.round(scaled * 8);
  const whole = Math.floor(eighths / 8);
  const rem = eighths % 8;
  const fracs = {1:'⅛',2:'¼',3:'⅜',4:'½',5:'⅝',6:'¾',7:'⅞'};
  if (rem === 0) return whole.toString();
  return (whole > 0 ? whole + ' ' : '') + (fracs[rem] || (rem+'/8'));
}

function fmtTime(sec) {
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + (s<10?'0':'') + s;
}

function startTimer(btnEl, seconds, id) {
  if (timers[id]) {
    clearInterval(timers[id].interval);
    delete timers[id];
    btnEl.classList.remove('running','done');
    btnEl.textContent = '⏱ ' + fmtTime(seconds);
    return;
  }
  let remaining = seconds;
  btnEl.classList.add('running');
  btnEl.textContent = '⏹ ' + fmtTime(remaining);
  timers[id] = {
    interval: setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(timers[id].interval);
        delete timers[id];
        btnEl.classList.remove('running');
        btnEl.classList.add('done');
        btnEl.textContent = '✓ Done';
        // Vibrate if supported
        if (navigator.vibrate) navigator.vibrate([200,100,200]);
      } else {
        btnEl.textContent = '⏹ ' + fmtTime(remaining);
      }
    }, 1000)
  };
}

function renderIngredients(recipe) {
  return recipe.ingredients.map(ing => `
    <div class="ing-item">
      <span class="ing-name">${ing.name}</span>
      <span class="ing-amt ing-${ing.name.replace(/\W+/g,'_')}">${fmtAmt(ing.base, recipe.servings, recipe.baseServings)}${ing.unit ? ' ' + ing.unit : ''}</span>
    </div>
  `).join('');
}

function renderSteps(recipe) {
  return recipe.steps.map((step, i) => `
    <div class="step-item">
      <div class="step-num">${i+1}</div>
      <div class="step-content">
        <div class="step-title">${step.title}</div>
        <div class="step-text">${step.text}</div>
        ${step.timer ? `<button class="timer-btn" id="timer-${recipe.id}-${i}" onclick="startTimer(this, ${step.timer}, '${recipe.id}-${i}')">⏱ ${fmtTime(step.timer)}</button>` : ''}
      </div>
    </div>
  `).join('');
}

function updateServings(recipeId, delta) {
  const recipe = RECIPES.find(r => r.id === recipeId);
  if (!recipe) return;
  recipe.servings = Math.max(1, recipe.servings + delta);
  document.getElementById('srv-' + recipeId).textContent = recipe.servings;
  // Update all ingredient amounts
  recipe.ingredients.forEach(ing => {
    const el = document.querySelector(`#card-${recipeId} .ing-${ing.name.replace(/\W+/g,'_')}`);
    if (el) el.textContent = fmtAmt(ing.base, recipe.servings, recipe.baseServings) + (ing.unit ? ' ' + ing.unit : '');
  });
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

let currentFilter = 'all';

function filterRecipes(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('recipeList');
  const filtered = currentFilter === 'all' ? RECIPES : RECIPES.filter(r => r.category.includes(currentFilter));
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">No recipes in this category</div>';
    return;
  }
  list.innerHTML = filtered.map(recipe => `
    <div class="recipe-card" id="card-${recipe.id}">
      <div class="card-header" onclick="toggleCard('${recipe.id}')">
        <div class="card-meta">
          <div class="card-tag" style="color:${recipe.tagColor}">${recipe.tag}</div>
          <div class="card-title">${recipe.title}</div>
          <div class="card-desc">${recipe.desc}</div>
          <div class="card-stats">
            <div class="card-stat"><div class="card-stat-val">${recipe.time}</div><div class="card-stat-lbl">Time</div></div>
            <div class="card-stat"><div class="card-stat-val">${recipe.baseServings}</div><div class="card-stat-lbl">Servings</div></div>
            <div class="card-stat"><div class="card-stat-val">${recipe.ingredients.length}</div><div class="card-stat-lbl">Ingredients</div></div>
          </div>
        </div>
        <div class="card-arrow">▼</div>
      </div>
      <div class="card-body">
        <div class="servings-bar">
          <span class="servings-lbl">Servings</span>
          <div class="servings-ctrl">
            <button class="srv-btn" onclick="updateServings('${recipe.id}', -1)">−</button>
            <span class="srv-count" id="srv-${recipe.id}">${recipe.servings}</span>
            <button class="srv-btn" onclick="updateServings('${recipe.id}', 1)">+</button>
          </div>
        </div>
        <div class="recipe-cols">
          <div class="ingredients-col">
            <div class="col-title">Ingredients</div>
            ${renderIngredients(recipe)}
          </div>
          <div class="steps-col">
            <div class="col-title">Steps</div>
            ${renderSteps(recipe)}
          </div>
        </div>
        ${recipe.notes ? `<div class="recipe-notes"><div class="notes-lbl">Notes</div>${recipe.notes}</div>` : ''}
      </div>
    </div>
  `).join('');
}

renderList();
</script>

</body>
</html>

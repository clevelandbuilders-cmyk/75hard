<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>75 Hard v2</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #111;
  color: #fff;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #1a1a1a;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: #e63946;
  color: white;
  border-radius: 6px;
}

.card {
  background: #1e1e1e;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #1a1a1a;
}

nav button {
  flex: 1;
}
</style>
</head>

<body>

<header>
  <div>
    <select id="profileSelect">
      <option value="dan">Dan</option>
      <option value="carrie">Carrie</option>
    </select>
  </div>
  <div>75 HARD</div>
</header>

<div id="app"></div>

<nav>
  <button onclick="setView('dashboard')">Home</button>
  <button onclick="setView('today')">Today</button>
  <button onclick="setView('freestyle')">Freestyle</button>
</nav>

<script>

// ================= STATE =================

let state = JSON.parse(localStorage.getItem('appState')) || {
  activeProfile: 'dan',
  profiles: {
    dan: createProfile(),
    carrie: createProfile()
  }
};

function createProfile() {
  return {
    day: 1,
    checklist: {
      workout1: false,
      workout2: false,
      outdoor: false,
      water: false,
      reading: false,
      diet: false,
      photo: false
    },
    freestyle: [],
    stats: {
      streak: 0,
      xp: 0
    }
  };
}

// ================= HELPERS =================

function save() {
  localStorage.setItem('appState', JSON.stringify(state));
  // TODO: sync to Google Sheets here
}

function current() {
  return state.profiles[state.activeProfile];
}

function speak(text) {
  const utter = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(utter);
}

// ================= VIEW SYSTEM =================

let view = "dashboard";

function setView(v) {
  view = v;
  render();
}

// ================= RENDER =================

function render() {
  if (view === "dashboard") renderDashboard();
  if (view === "today") renderToday();
  if (view === "freestyle") renderFreestyle();
}

// ================= DASHBOARD =================

function renderDashboard() {
  const p = current();

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Day ${p.day}</h2>
      <p>Streak: ${p.stats.streak}</p>
      <p>XP: ${p.stats.xp}</p>
    </div>

    <div class="card">
      <button onclick="setView('today')">Go to Today</button>
      <button onclick="setView('freestyle')">Start Workout</button>
    </div>
  `;
}

// ================= TODAY =================

function renderToday() {
  const p = current();

  let html = `<div class="card"><h2>Checklist</h2>`;

  Object.keys(p.checklist).forEach(key => {
    html += `
      <div>
        <input type="checkbox"
          ${p.checklist[key] ? "checked" : ""}
          onchange="toggle('${key}')"
        />
        ${key}
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("app").innerHTML = html;
}

function toggle(key) {
  const p = current();
  p.checklist[key] = !p.checklist[key];
  save();
  render();
}

// ================= FREESTYLE =================

let timer = 0;
let running = false;
let interval;

function renderFreestyle() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Freestyle Workout</h2>

      <p id="time">${timer}s</p>

      <button onclick="startTimer()">Start</button>
      <button onclick="stopTimer()">Stop</button>

      <h3>Add Blocks</h3>

      <button onclick="addTime(8)">Warmup +8</button>
      <button onclick="addTime(10)">Core +10</button>
      <button onclick="addTime(12)">Strength +12</button>
      <button onclick="addTime(10)">Stretch +10</button>

      <h3>Audio Demo</h3>
      <button onclick="playDemo()">🔊 Goblet Squat</button>

      <button onclick="saveSession()">Save Session</button>
    </div>
  `;
}

function startTimer() {
  if (running) return;
  running = true;
  interval = setInterval(() => {
    timer++;
    document.getElementById("time").innerText = timer + "s";
  }, 1000);
}

function stopTimer() {
  running = false;
  clearInterval(interval);
}

function addTime(mins) {
  timer += mins * 60;
  renderFreestyle();
}

function playDemo() {
  speak("Goblet squat. Hold weight at chest. Sit back and down.");
}

function saveSession() {
  const p = current();

  p.freestyle.push({
    duration: timer,
    date: new Date().toISOString()
  });

  timer = 0;
  save();
  alert("Saved!");
}

// ================= PROFILE SWITCH =================

document.getElementById("profileSelect").onchange = function() {
  state.activeProfile = this.value;
  save();
  render();
};

// ================= INIT =================

render();

</script>

</body>
</html>

<style>

/* HEADER */
.header {

top: 0;

.store-tag {

.main-title {

}

.header-actions { display: flex; gap: 8px; align-items: center; }
.hdr-btn {

font-size: 9px;
letter-spacing: 1.5px;

padding: 6px 12px;

background: none;
color: #555;

}
.hdr-btn:hover { border-color: #888; color: #ccc; }

/* Progress bar */
.progress-wrap { height: 4px; background: #333; border-radius: 2px; overflow: hidden; }

.progress-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: #555;
margin-top: 6px;
letter-spacing: 1px;
}

/* MAIN */
.main { max-width: 640px; margin: 0 auto; padding: 20px 16px; }

/* SECTION */
.section { margin-bottom: 10px; background: #fdfcf9; border: 1px solid #e2ddd8; overflow: hidden; }

.section-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 16px;
cursor: pointer;
user-select: none;
border-bottom: 1px solid #e2ddd8;
transition: background 0.15s;
}
.section-header:hover { background: #faf8f5; }

.section-left { display: flex; align-items: center; gap: 12px; }
.section-emoji { font-size: 20px; }
.section-name {
font-family: ‘Playfair Display’, serif;
font-size: 17px;
font-weight: 700;
color: #1c1a17;
}
.section-count {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: #555;
letter-spacing: 1px;
margin-top: 1px;
}
.section-chevron { font-size: 11px; color: #555; transition: transform 0.2s; }
.section.collapsed .section-chevron { transform: rotate(-90deg); }

.section-badge {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 1px;
padding: 3px 8px;
border-radius: 20px;
}

/* ITEM LIST */
.item-list { display: none; }
.section:not(.collapsed) .item-list { display: block; }

.item {
display: flex;
align-items: flex-start;
gap: 12px;
padding: 12px 16px;
border-bottom: 1px solid #e2ddd8;
cursor: pointer;
transition: background 0.12s;
user-select: none;
}
.item:last-child { border-bottom: none; }
.item:hover { background: #faf8f5; }
.item.checked { background: #edf5f0; }

.item-box {
width: 22px;
height: 22px;
border: 2px solid #bbb8b4;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
margin-top: 1px;
transition: all 0.15s;
border-radius: 3px;
}
.item.checked .item-box {
background: #52b788;
border-color: #52b788;
color: #fff;
}

.item-body { flex: 1; min-width: 0; }
.item-name {
font-size: 15px;
font-weight: 600;
color: #1c1a17;
margin-bottom: 2px;
transition: all 0.15s;
}
.item.checked .item-name {
text-decoration: line-through;
color: #555;
}
.item-detail {
font-size: 12px;
color: #555;
line-height: 1.5;
}
.item-qty {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: #555;
flex-shrink: 0;
padding-top: 3px;
text-align: right;
min-width: 60px;
}
.item.checked .item-qty { color: #c8e0d4; }

/* NUTRITION TAG */
.nt {
display: inline-block;
font-family: ‘DM Mono’, monospace;
font-size: 8px;
letter-spacing: 1px;
text-transform: uppercase;
padding: 1px 5px;
margin-left: 4px;
border-radius: 2px;
vertical-align: middle;
position: relative;
top: -1px;
}
.nt-p { background: rgba(44,95,138,0.12); color: #4cc9f0; }
.nt-ai { background: rgba(58,125,90,0.12); color: #52b788; }
.nt-f { background: rgba(180,134,11,0.12); color: #f4c430; }
.nt-c { background: rgba(107,76,138,0.12); color: #6b4c8a; }

/* DONE STRIP */
.all-done {
display: none;
text-align: center;
padding: 32px 20px;
background: #edf5f0;
border: 1px solid #c8e0d4;
margin-bottom: 16px;
}
.all-done.show { display: block; }
.all-done-icon { font-size: 40px; margin-bottom: 8px; }
.all-done-title {
font-family: ‘Playfair Display’, serif;
font-size: 22px;
font-weight: 900;
color: #52b788;
margin-bottom: 4px;
}
.all-done-sub { font-size: 13px; color: #555; }

/* FILTER BAR */
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-btn {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 1.5px;
text-transform: uppercase;
padding: 5px 12px;
background: #fdfcf9;
border: 1px solid #e2ddd8;
color: #555;
cursor: pointer;
transition: all 0.15s;
-webkit-appearance: none;
appearance: none;
border-radius: 0;
}
.filter-btn.active { background: #1c1a17; border-color: #1c1a17; color: #fff; }
</style>

</head>

      { name: 'Hummus', qty: '1 tub', detail: 'Veggie dip snack. Aldi carries this.', tags: ['f','p'] },
    ]
  },
  {
    name: 'Spices, Sauces & Pantry',

      { name: 'Cumin (ground)', qty: 'Check stock', detail: 'Turkey taco bowls.', tags: [] },
      { name: 'Chili Powder', qty: 'Check stock', detail: 'Taco bowls.', tags: [] },

      { name: 'Black Pepper', qty: 'Check stock', detail: 'Activates turmeric absorption.', tags: [] },
      { name: 'Hot Sauce', qty: 'Check stock', detail: 'Dan\'s egg scramble staple.', tags: [] },
      { name: 'Salsa (jar, no added sugar)', qty: '1–2 jars', detail: 'Taco bowls. Check label — no added sugar. Aldi has a good one.', tags: [] },
      { name: 'Jarred Marinara (no added sugar)', qty: '1–2 jars', detail: 'Pasta dinners. Check first 3 ingredients for sugar. Aldi works fine.', tags: [] },
      { name: 'Low-Sodium Chicken or Beef Broth', qty: '2 cartons', detail: 'Slow cooker stew base.', tags: [] },
      { name: 'Low-Sodium Soy Sauce or Coconut Aminos', qty: '1 bottle', detail: 'Shrimp stir-fry. Aldi carries soy sauce.', tags: [] },
      { name: 'Honey', qty: '1 jar', detail: 'Protein energy balls (¼ cup per batch).', tags: [] },
    ]
  },
  {
    name: 'Drinks & Supplements',
    emoji: '💧',
    color: '#2c5f8a',
    items: [
      { name: 'Sparkling Water / Seltzer', qty: '2 cases', detail: 'Makes hitting a gallon of water way easier. Plain, no sweeteners.', tags: [] },
      { name: 'Black Coffee / Ground Coffee', qty: 'Check stock', detail: 'Dan\'s morning staple. No flavored creamers.', tags: [] },
      { name: 'Green Tea or Herbal Tea', qty: '1–2 boxes', detail: 'Carrie\'s evening wind-down instead of alcohol.', tags: ['ai'] },
      { name: 'Ground Flaxseed', qty: '1 bag', detail: 'Dan: stir into oatmeal or shakes. Omega-3 boost for disc inflammation.', tags: ['ai','f'] },
    ]
  },
];

// State
const state = JSON.parse(localStorage.getItem('75h_grocery') || '{}');
let currentFilter = 'all';

function save() { localStorage.setItem('75h_grocery', JSON.stringify(state)); }

function getItemId(sIdx, iIdx) { return `s${sIdx}_i${iIdx}`; }

function buildList() {
  const wrap = document.getElementById('listWrap');
  wrap.innerHTML = '';

  SECTIONS.forEach((sec, sIdx) => {
    const div = document.createElement('div');
    div.className = 'section' + (localStorage.getItem('75h_col_' + sIdx) === '1' ? ' collapsed' : '');
    div.id = 'sec_' + sIdx;

    const checkedCount = sec.items.filter((_, iIdx) => state[getItemId(sIdx, iIdx)]).length;
    const total = sec.items.length;

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(${sIdx})">
        <div class="section-left">
          <div class="section-emoji">${sec.emoji}</div>
          <div>
            <div class="section-name">${sec.name}</div>
            <div class="section-count">${checkedCount} of ${total} items</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${checkedCount === total ? `<span class="section-badge" style="background:rgba(58,125,90,0.12);color:#52b788">Done ✓</span>` : ''}
          <div class="section-chevron">▼</div>
        </div>
      </div>
      <div class="item-list" id="list_${sIdx}"></div>
    `;

    wrap.appendChild(div);
    renderItems(sIdx);
  });

  updateProgress();
}

function renderItems(sIdx) {
  const sec = SECTIONS[sIdx];
  const list = document.getElementById('list_' + sIdx);
  if (!list) return;
  list.innerHTML = '';

  sec.items.forEach((item, iIdx) => {
    const id = getItemId(sIdx, iIdx);
    const checked = !!state[id];

    if (currentFilter === 'remaining' && checked) return;
    if (currentFilter === 'checked' && !checked) return;

    const row = document.createElement('div');
    row.className = 'item' + (checked ? ' checked' : '');
    row.onclick = () => toggleItem(sIdx, iIdx);

    const tagHTML = item.tags.map(t => {
      const labels = { p: 'Protein', ai: 'Anti-Inflam', f: 'Fat', c: 'Carb' };
      return `<span class="nt nt-${t}">${labels[t]}</span>`;
    }).join('');

    row.innerHTML = `
      <div class="item-box">${checked ? '✓' : ''}</div>
      <div class="item-body">
        <div class="item-name">${item.name}${tagHTML}</div>
        <div class="item-detail">${item.detail}</div>
      </div>
      <div class="item-qty">${item.qty}</div>
    `;
    list.appendChild(row);
  });
}

function toggleItem(sIdx, iIdx) {
  const id = getItemId(sIdx, iIdx);
  state[id] = !state[id];
  save();
  renderItems(sIdx);
  // Update section header
  const sec = SECTIONS[sIdx];
  const checkedCount = sec.items.filter((_, i) => state[getItemId(sIdx, i)]).length;
  const header = document.querySelector(`#sec_${sIdx} .section-count`);
  if (header) header.textContent = `${checkedCount} of ${sec.items.length} items`;
  const badgeWrap = document.querySelector(`#sec_${sIdx} .section-header > div:last-child`);
  if (badgeWrap) {
    const existingBadge = badgeWrap.querySelector('.section-badge');
    if (checkedCount === sec.items.length && !existingBadge) {
      const badge = document.createElement('span');
      badge.className = 'section-badge';
      badge.style.cssText = 'background:rgba(58,125,90,0.12);color:#52b788';
      badge.textContent = 'Done ✓';
      badgeWrap.insertBefore(badge, badgeWrap.querySelector('.section-chevron'));
    } else if (checkedCount < sec.items.length && existingBadge) {
      existingBadge.remove();
    }
  }
  updateProgress();
}

function toggleSection(sIdx) {
  const sec = document.getElementById('sec_' + sIdx);
  const collapsed = sec.classList.toggle('collapsed');
  localStorage.setItem('75h_col_' + sIdx, collapsed ? '1' : '0');
}

function updateProgress() {
  let total = 0, checked = 0;
  SECTIONS.forEach((sec, sIdx) => {
    sec.items.forEach((_, iIdx) => {
      total++;
      if (state[getItemId(sIdx, iIdx)]) checked++;
    });
  });
  const pct = total > 0 ? (checked / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = checked + ' of ' + total + ' items checked';
  const done = document.getElementById('allDone');
  done.classList.toggle('show', checked === total && total > 0);
}

function filterBy(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  SECTIONS.forEach((_, sIdx) => renderItems(sIdx));
}

function clearAll() {
  if (!confirm('Clear all checked items?')) return;
  Object.keys(state).forEach(k => delete state[k]);
  save();
  buildList();
}
